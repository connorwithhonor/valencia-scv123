# valencia.scv123.com - Netlify build config
# Source of truth: this repo. Deploys triggered on push to main.
# Snapshot-API uploads are deprecated — see SITE-REGISTRY.txt + connor-own-sites-git-canonical.md

[build]
  publish = "."

# Disable HTML post-processing so we never inject favicon/meta tags multiple times
# (Previous manual-deploy sessions injected duplicate favicon blocks; auto-deploy from
# git should never modify the source HTML at build time.)
[build.processing]
  skip_processing = true

[build.processing.html]
  pretty_urls = true

# Don't publish project-internal docs even if they get committed
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/README*"
  to = "/404.html"
  status = 404
